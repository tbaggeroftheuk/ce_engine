name: CMake Build and Release

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write  # Required for creating releases and pushing tags

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        compiler: [cl, clang]
        include:
          - os: windows-latest
            compiler: cl
          - os: windows-latest
            compiler: clang
          - os: ubuntu-latest
            compiler: clang

    steps:
    - uses: actions/checkout@v4

    - name: Set build directory
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    # Install dependencies on Ubuntu
    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          clang \
          cmake \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev

    # Configure CMake
    - name: Configure CMake
      shell: bash
      run: |
        CMAKE_ARGS="-B ${{ steps.strings.outputs.build-output-dir }} \
        -DCMAKE_CXX_COMPILER=${{ matrix.compiler == 'cl' && 'cl' || 'clang++' }} \
        -DCMAKE_C_COMPILER=${{ matrix.compiler == 'cl' && 'cl' || 'clang' }} \
        -DCMAKE_BUILD_TYPE=Release \
        -DRAYLIB_NO_WARNINGS=ON \
        -S ${{ github.workspace }}"

        if [ "${{ matrix.os }}" = "windows-latest" ] && [ "${{ matrix.compiler }}" = "cl" ]; then
          CMAKE_ARGS="$CMAKE_ARGS -A x64"
        fi

        echo "Running: cmake $CMAKE_ARGS"
        cmake $CMAKE_ARGS

    # Build the project
    - name: Build
      run: |
        BUILD_CMD="cmake --build ${{ steps.strings.outputs.build-output-dir }} --config Release"
        if [ "${{ matrix.os }}" = "windows-latest" ] && [ "${{ matrix.compiler }}" = "cl" ]; then
          BUILD_CMD="$BUILD_CMD -- /p:Platform=x64"
        fi
        echo "Running: $BUILD_CMD"
        $BUILD_CMD

    # Create Git tag for this release
    - name: Create Git Tag
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        TAG=v1.0.${{ github.run_number }}
        git tag $TAG
        git push origin $TAG

    # Create a GitHub Release
    - name: Create Release
      id: release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release ${{ github.sha }}
        body: |
          Changes in this build:
          ${{ github.event.head_commit.message }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Upload build artifacts
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.os }}-${{ matrix.compiler }}
        path: ${{ steps.strings.outputs.build-output-dir }}