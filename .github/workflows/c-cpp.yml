name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]  # Build on Linux and Windows
    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang cmake pkg-config python3 python3-pip git \
          libgl1-mesa-dev libx11-dev libxi-dev libxrandr-dev libxcursor-dev libxinerama-dev libxext-dev

    - name: Install build dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install -y cmake git visualstudio2019buildtools
        refreshenv

    - name: Build and install Raylib
      run: |
        git clone https://github.com/raysan5/raylib.git
        cd raylib
        mkdir build && cd build
        if [ "${{ runner.os }}" == "Linux" ]; then
          cmake -DBUILD_SHARED_LIBS=ON ..
          make -j4
          sudo make install
          sudo ldconfig
        else
          cmake -G "Visual Studio 16 2019" -A x64 ..
          cmake --build . --config Release
        fi

    - name: Build and pack assets
      run: |
        if [ "${{ runner.os }}" == "Linux" ]; then
          make exe_only
        else
          cmake --build . --config Release  # Adjust if you have a separate Windows make/pack target
        fi

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v1.0.${{ github.run_number }}
        release_name: Release v1.0.${{ github.run_number }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ runner.os == 'Linux' && './ce_engine' || './Release/ce_engine.exe' }}
        asset_name: ${{ runner.os == 'Linux' && 'ce_engine' || 'ce_engine.exe' }}
        asset_content_type: application/octet-stream