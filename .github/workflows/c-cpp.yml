name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Install dependencies
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang cmake pkg-config python3 python3-pip \
          libgl1-mesa-dev libx11-dev libxi-dev libraylib-dev

    - name: Configure and build
      run: make clang

    - name: Run tests (if any)
      run: make check || true

    - name: Run executable
      run: ./ce_engine || true
