name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    # -----------------------------
    # Install dependencies
    # -----------------------------
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang cmake pkg-config python3 python3-pip git \
          libgl1-mesa-dev libx11-dev libxi-dev libxrandr-dev libxcursor-dev libxinerama-dev libxext-dev

    - name: Install MSYS2 / MinGW64 and Raylib
      if: runner.os == 'Windows'
      shell: bash
      run: |
        # Install MSYS2 (assumes pre-installed via GitHub runner)
        pacman -Syu --noconfirm
        pacman -S --noconfirm mingw-w64-x86_64-toolchain mingw-w64-x86_64-raylib mingw-w64-x86_64-python mingw-w64-x86_64-pkg-config

    # -----------------------------
    # Build ce_engine using Makefile
    # -----------------------------
    - name: Build ce_engine (Linux)
      if: runner.os == 'Linux'
      run: |
        cd ${{ github.workspace }}
        make exe_only

    - name: Build ce_engine (Windows, MinGW)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        make exe_only CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++ \
             CXXFLAGS="-Wall -Wextra -std=c++20 -I/mingw64/include" \
             LDFLAGS="-L/mingw64/lib -lraylib -lole32 -luuid -lcomdlg32 -limm32 -loleaut32"

    # -----------------------------
    # Create Release (only on Linux)
    # -----------------------------
    - name: Create Release
      if: runner.os == 'Linux'
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v1.0.${{ github.run_number }}
        release_name: Release v1.0.${{ github.run_number }}
        draft: false
        prerelease: false

    # -----------------------------
    # Upload Linux ELF
    # -----------------------------
    - name: Upload Linux ELF
      if: runner.os == 'Linux'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./ce_engine
        asset_name: ce_engine
        asset_content_type: application/octet-stream

    # -----------------------------
    # Upload Windows EXE
    # -----------------------------
    - name: Upload Windows EXE
      if: runner.os == 'Windows'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./ce_engine.exe
        asset_name: ce_engine.exe
        asset_content_type: application/octet-stream