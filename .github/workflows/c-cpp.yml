name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Install dependencies
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang cmake pkg-config python3 python3-pip \
          libgl1-mesa-dev libx11-dev libxi-dev libraylib-dev

    # Build project and pack assets
    - name: Build and pack assets
      run: make clang exe_only

    # Upload executable and assets
    - name: Upload release artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ce_engine-release
        path: |
          ./ce_engine
          ./data.tcf