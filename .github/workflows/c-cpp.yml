name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    # -----------------------------
    # Install dependencies
    # -----------------------------
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang cmake pkg-config python3 python3-pip git \
          libgl1-mesa-dev libx11-dev libxi-dev libxrandr-dev libxcursor-dev libxinerama-dev libxext-dev

    - name: Install Windows dependencies
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        choco install -y cmake git visualstudio2022buildtools
        refreshenv

    # -----------------------------
    # Build Raylib
    # -----------------------------
    - name: Build Raylib (Linux)
      if: runner.os == 'Linux'
      run: |
        git clone https://github.com/raysan5/raylib.git
        cd raylib
        mkdir build && cd build
        cmake -DBUILD_SHARED_LIBS=ON ..
        make -j4
        sudo make install
        sudo ldconfig

    - name: Build Raylib (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        git clone https://github.com/raysan5/raylib.git
        cd raylib
        mkdir build
        cd build
        cmake -G "Visual Studio 17 2022" -A x64 ..
        cmake --build . --config Release

    # -----------------------------
    # Build ce_engine using Makefile
    # -----------------------------
    - name: Build ce_engine (Linux)
      if: runner.os == 'Linux'
      run: |
        cd ${{ github.workspace }}
        make exe_only

    - name: Build ce_engine (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        cd ${{ github.workspace }}
        make exe_only

    # -----------------------------
    # Create Release (only once)
    # -----------------------------
    - name: Create Release
      if: runner.os == 'Linux'
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v1.0.${{ github.run_number }}
        release_name: Release v1.0.${{ github.run_number }}
        draft: false
        prerelease: false

    # -----------------------------
    # Upload Linux ELF
    # -----------------------------
    - name: Upload Linux ELF
      if: runner.os == 'Linux'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./ce_engine
        asset_name: ce_engine
        asset_content_type: application/octet-stream

    # -----------------------------
    # Upload Windows EXE
    # -----------------------------
    - name: Upload Windows EXE
      if: runner.os == 'Windows'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./ce_engine.exe
        asset_name: ce_engine.exe
        asset_content_type: application/octet-stream